[[tasks]]
mutations = ["i128_deserialization_70ea33a_1"]

[tasks.source]
repo = "https://github.com/jamesmunns/postcard"
commits = ["70ea33a1ac7f82632697f4578002267eaf9095f5"]
commit_subjects = ["Fix deserialization of i128"]
summary = "`Deserializer::deserialize_i128` reached for 16 raw little-endian bytes, but the matching `serialize_i128` writes a zig-zag-encoded varint. Any non-zero (and especially negative) `i128` therefore failed to roundtrip — `from_bytes::<i128>(&to_stdvec(&x).unwrap())` produced a different value or returned an error. The fix replaces the raw read with `try_take_varint_u128` + a new `de_zig_zag_i128` helper to mirror the encoder."

[tasks.injection]
kind = "patch"
files = ["source/postcard/src/de/deserializer.rs"]
locations = [{ file = "source/postcard/src/de/deserializer.rs", symbol = "deserialize_i128" }]
patch = "patches/i128_deserialization_70ea33a_1.patch"

[tasks.bug]
short_name = "i128_deserialization"
invariant = "For every `x: i128`, `from_bytes::<i128>(&to_stdvec(&x).unwrap()).unwrap() == x`. Postcard's wire format for signed integers is a zig-zag-encoded varint, and the decoder must mirror the encoder."
how_triggered = "The mutation reverts `deserialize_i128` from `try_take_varint_u128` + `de_zig_zag_i128` back to a raw `try_take_n(16)` + `i128::from_le_bytes`. The serializer still emits varint+zig-zag, so the byte stream and decoder format disagree and roundtrip fails on every non-trivial value."

[[tasks.tasks]]
property = "I128Roundtrip"
witnesses = [
  { test_fn = "witness_i128_roundtrip_case_negative_large", note = "Regression value lifted directly from the test added in the fix commit." },
  { test_fn = "witness_i128_roundtrip_case_positive_one" },
  { test_fn = "witness_i128_roundtrip_case_negative_one" },
]

[[tasks]]
mutations = ["cobs_acc_oob_41c2ddb_1"]

[tasks.source]
repo = "https://github.com/jamesmunns/postcard"
commits = ["41c2ddbdfc42e08e8eb2aa539a2a46806e65f4df"]
commit_subjects = ["fix: cobs accumulator out-of-bounds index when data is 1 byte too long (#90)"]
prs = [90]
summary = "`CobsAccumulator::feed` split each input chunk into `(take, release)` at the first sentinel and copied `take` into the internal buffer. The in-bounds guard checked `self.idx + n <= N`, where `n` excluded the sentinel byte that `take` actually contains; when the encoded frame was exactly `N + 1` bytes long the check passed by one byte and `extend_unchecked` indexed out of bounds and panicked. The fix uses `take.len()` instead of `n` so the bound matches the actual write."

[tasks.injection]
kind = "patch"
files = ["source/postcard/src/accumulator.rs"]
locations = [{ file = "source/postcard/src/accumulator.rs", symbol = "CobsAccumulator::feed" }]
patch = "patches/cobs_acc_oob_41c2ddb_1.patch"

[tasks.bug]
short_name = "cobs_acc_oob"
invariant = "For every `N: usize` and every byte slice `frame`, `CobsAccumulator::<N>::new().feed::<T>(frame)` must complete without panicking — frames that exceed the buffer are reported as `FeedResult::OverFull`, never as a panic from out-of-bounds indexing."
how_triggered = "The mutation restores the off-by-one bound `self.idx + n <= N`, where `n` is the chunk length excluding the sentinel byte. When the encoded frame is exactly `N + 1` bytes long, the bound passes but `extend_unchecked` then writes one byte past the buffer, panicking under debug bounds checks (and corrupting memory in release)."

[[tasks.tasks]]
property = "CobsAccNoOob"
witnesses = [
  { test_fn = "witness_cobs_acc_no_oob_case_overrun_by_one", note = "11-byte buffer, 12-byte encoded frame — the exact regression scenario." },
  { test_fn = "witness_cobs_acc_no_oob_case_overrun_by_one_b" },
]

[[tasks]]
mutations = ["tuple_struct_deserialize_2a62f8c_1"]

[tasks.source]
repo = "https://github.com/jamesmunns/postcard"
commits = ["2a62f8c3cd643ccabea9034b71f9c9e97529f4e3"]
commit_subjects = ["Fix tuple struct deserialization bug"]
prs = [9]
summary = "`Deserializer::deserialize_tuple_struct` discarded its `len` argument and forwarded to `deserialize_seq`. The serializer for a tuple struct calls `serialize_tuple` (no varint length prefix), but `deserialize_seq` expects a leading varint length, so the decoder's length cursor consumed a payload byte and every subsequent field was misaligned. The fix forwards to `deserialize_tuple(len, visitor)` so the wire shapes line up."

[tasks.injection]
kind = "patch"
files = ["source/postcard/src/de/deserializer.rs"]
locations = [{ file = "source/postcard/src/de/deserializer.rs", symbol = "deserialize_tuple_struct" }]
patch = "patches/tuple_struct_deserialize_2a62f8c_1.patch"

[tasks.bug]
short_name = "tuple_struct_deserialize"
invariant = "For every newtype-style tuple struct `S(T1, T2, ...)`, `from_bytes::<S>(&to_stdvec(&v).unwrap()).unwrap() == v`. The deserializer for a tuple struct must read the same number of fixed positional fields the serializer wrote, with no varint length prefix."
how_triggered = "The mutation re-introduces `_len` (discarded) and forwards `deserialize_tuple_struct` to `deserialize_seq`. `deserialize_seq` reads a varint length first, so the decoder consumes a payload byte as the length and then under- or over-reads the actual fields, producing the wrong value or `SerdeDeCustom`."

[[tasks.tasks]]
property = "TupleStructRoundtrip"
witnesses = [
  { test_fn = "witness_tuple_struct_roundtrip_case_small" },
  { test_fn = "witness_tuple_struct_roundtrip_case_large" },
]

[[tasks]]
mutations = ["serialize_bytes_size_prefix_58b3047_1"]

[tasks.source]
repo = "https://github.com/jamesmunns/postcard"
commits = ["58b30476955e9fc9a76c3bc85930c407b7ae86c4"]
commit_subjects = ["Add missing size prefix for serialize_bytes (#22)"]
prs = [22]
summary = "`Serializer::serialize_bytes` emitted only the raw payload bytes, but the deserializer for `&[u8]` / `Vec<u8>` reads a varint length prefix first. Any type whose `Serialize` impl funnels through `serialize_bytes` (`serde_bytes::Bytes`, `CStr`, `bytes::Bytes`) therefore failed to roundtrip — the decoder consumed a payload byte as the length. The fix prepends `try_push_varint_usize(v.len())` before extending the output."

[tasks.injection]
kind = "patch"
files = ["source/postcard/src/ser/serializer.rs"]
locations = [{ file = "source/postcard/src/ser/serializer.rs", symbol = "Serializer::serialize_bytes" }]
patch = "patches/serialize_bytes_size_prefix_58b3047_1.patch"

[tasks.bug]
short_name = "serialize_bytes_size_prefix"
invariant = "For every byte payload `bs`, the bytes that `serialize_bytes(&bs)` writes to the output must be a varint-length-prefixed encoding of `bs`. Specifically, deserializing the resulting buffer as `Vec<u8>` (whose `Deserialize` impl reads `varint_usize` then that many bytes) must yield the original payload."
how_triggered = "The mutation removes the `try_push_varint_usize(v.len())` call so `serialize_bytes` writes only the raw payload. The decoder still reads a varint length first, so it parses the first payload byte as the length and either truncates / over-reads the remainder, returning `DeserializeUnexpectedEnd` or a wrong-length result."

[[tasks.tasks]]
property = "BytesRoundtrip"
witnesses = [
  { test_fn = "witness_bytes_roundtrip_case_short" },
  { test_fn = "witness_bytes_roundtrip_case_empty" },
]

[[tasks]]
mutations = ["max_size_varint_zero_f31d226_1"]

[tasks.source]
repo = "https://github.com/jamesmunns/postcard"
commits = ["f31d2263ce37f9aae7413ab2a78b787f8214b89b"]
commit_subjects = ["Fix another bug when the capacity of a heapless::Vec or String is zero"]
origin = "internal report"
summary = "The `varint_size(max_n)` helper that backs `<heapless::Vec<u8, N>>::POSTCARD_MAX_SIZE` returned `0` when `max_n == 0`, because `bits = 64 - leading_zeros(0) = 0` and the rounded-up division still produced 0. Postcard's runtime varint encoder writes a single `0x00` byte for a length of 0, so the const under-estimated by one for any zero-capacity collection. The fix adds an `if max_n == 0 { return 1; }` guard."

[tasks.injection]
kind = "patch"
files = ["source/postcard/src/max_size.rs"]
locations = [{ file = "source/postcard/src/max_size.rs", symbol = "varint_size" }]
patch = "patches/max_size_varint_zero_f31d226_1.patch"

[tasks.bug]
short_name = "max_size_varint_zero"
invariant = "For every type `T` whose serialized form starts with a varint length prefix, `<T as MaxSize>::POSTCARD_MAX_SIZE` must be at least the length of the actual encoding. In particular `<heapless::Vec<u8, 0>>::POSTCARD_MAX_SIZE >= 1`, because the empty vec encodes as the single varint byte `0x00`."
how_triggered = "The mutation removes the `if max_n == 0 { return 1; }` early return. With `max_n == 0`, the formula computes `bits = 0`, `(0 + 6) / 7 = 0`, returning `varint_size(0) = 0`. `<heapless::Vec<u8, 0>>::POSTCARD_MAX_SIZE` then becomes 0, even though the runtime encoder emits a 1-byte `[0x00]`."

[[tasks.tasks]]
property = "MaxSizeHeaplessVecZero"
witnesses = [
  { test_fn = "witness_max_size_heapless_vec_zero_case_default" },
]

[[tasks]]
mutations = ["max_size_varint_off_by_one_c160626_1"]

[tasks.source]
repo = "https://github.com/jamesmunns/postcard"
commits = ["c160626b5e7dd8e9a95c140aed8972e8e2a14a39"]
commit_subjects = ["Add max size edge case tests and fix bug"]
origin = "internal report"
summary = "The same `varint_size(max_n)` helper rounded up bits using `BITS_PER_BYTE - 1 = 7` instead of `BITS_PER_VARINT_BYTE - 1 = 6`. When `bits` is exactly a multiple of 7 (i.e. `max_n` lies in `[2^7k, 2^7k+1)` for `k >= 1`), this nudges the result one byte too high, so `<heapless::Vec<u8, N>>::POSTCARD_MAX_SIZE` over-estimates and breaks `assert_eq!(POSTCARD_MAX_SIZE, serialized.len())` for capacities like 127 and 16383."

[tasks.injection]
kind = "patch"
files = ["source/postcard/src/max_size.rs"]
locations = [{ file = "source/postcard/src/max_size.rs", symbol = "varint_size" }]
patch = "patches/max_size_varint_off_by_one_c160626_1.patch"

[tasks.bug]
short_name = "max_size_varint_off_by_one"
invariant = "For a fully-filled `heapless::Vec<u8, N>`, `<heapless::Vec<u8, N>>::POSTCARD_MAX_SIZE == serialized_length(v)` — `MaxSize` is a tight upper bound, not just any upper bound. Specifically `POSTCARD_MAX_SIZE = N + varint_size(N)`, where `varint_size(N) = ceil(bits_needed(N) / 7)`."
how_triggered = "The mutation flips the rounding constant in `varint_size` from `BITS_PER_VARINT_BYTE - 1` (= 6) back to `BITS_PER_BYTE - 1` (= 7). For `bits = 7` (`max_n` in 64..=127) the divisor turns 13/7 into 14/7, returning 2 instead of 1; the same happens at `bits = 14`. The const is now one byte larger than the runtime encoding, breaking the `MaxSize` invariant for capacities like 127 and 16383."

[[tasks.tasks]]
property = "MaxSizeVecUpperBound"
witnesses = [
  { test_fn = "witness_max_size_vec_upper_bound_case_127", note = "bits=7; buggy varint_size returns 2 instead of 1." },
  { test_fn = "witness_max_size_vec_upper_bound_case_16383", note = "bits=14; buggy varint_size returns 3 instead of 2." },
]

[[tasks]]
mutations = ["collect_str_unreachable_77fd54b_1"]

[tasks.source]
repo = "https://github.com/jamesmunns/postcard"
commits = ["77fd54b18977e8491ebe1b67cc0d104e32ab02d6"]
commit_subjects = ["Potential fix for collect_str bug"]
origin = "internal report"
summary = "`Serializer::collect_str` was `unreachable!()`, so any type whose `Serialize` impl funnels through it (the canonical case is `chrono`'s timestamp types) panicked at runtime. The fix runs the formatter twice: once into a counting writer to learn the byte length, then once into the real flavor after writing a varint length prefix — matching the wire format of a regular `serialize_str`."

[tasks.injection]
kind = "patch"
files = ["source/postcard/src/ser/serializer.rs"]
locations = [{ file = "source/postcard/src/ser/serializer.rs", symbol = "Serializer::collect_str" }]
patch = "patches/collect_str_unreachable_77fd54b_1.patch"

[tasks.bug]
short_name = "collect_str_unreachable"
invariant = "Calling `Serializer::collect_str` for any `Display` value `v` must succeed and produce the same byte sequence as `serialize_str(&format!(\"{v}\"))`: a varint length prefix followed by the UTF-8 bytes."
how_triggered = "The mutation replaces the two-pass implementation with `unreachable!()`. Any serialize call that funnels through `collect_str` (e.g. a custom `Serialize` impl that calls `ser.collect_str(&self.0)`) panics at runtime instead of producing a length-prefixed string."

[[tasks.tasks]]
property = "CollectStrRoundtrip"
witnesses = [
  { test_fn = "witness_collect_str_roundtrip_case_short_a" },
  { test_fn = "witness_collect_str_roundtrip_case_short_b" },
]

